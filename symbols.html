<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注音符號表｜ㄅㄆㄇ大冒險</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="symbols-shell">

    <header class="symbols-header">
      <span class="decor" style="top:150px; left:4%; animation-delay:-1.5s;" aria-hidden="true">☁️</span>
      <span class="decor" style="top:20px; right:9%; animation-delay:-3.5s;" aria-hidden="true">🌞</span>
      <span class="decor decor--sm" style="top:92px; right:16%; animation-delay:-2s;" aria-hidden="true">⭐</span>
      <a href="index.html" class="symbols-back">← 鍵盤</a>
      <h1 class="symbols-title">🌈 ㄅㄆㄇ大冒險</h1>
    </header>

    <!-- Sticky filter tabs -->
    <nav id="filter-nav" class="filter-nav"></nav>

    <!-- Symbol grid -->
    <main id="symbol-grid"></main>

    <footer class="symbols-footer">
      37 個注音符號：21 個聲符 + 16 個韻符 ｜ 20 個結合韻
    </footer>

  </div>

  <script type="module" src="js/symbols.js"></script>
</body>
</html>
