<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ㄅㄆㄇ大冒險｜注音符號學習 APP</title>
  <meta name="description" content="陪小朋友一起認識 37 個注音符號，學發音、看嘴型、玩遊戲！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <span class="app-header__title">ㄅㄆㄇ大冒險</span>
      <nav class="app-header__nav">
        <a href="game.html" class="nav-link">🎤 遊戲</a>
        <a href="symbols.html" class="nav-link">符號表</a>
      </nav>
    </header>

    <!-- Display panel -->
    <div class="display-panel">
      <span class="decor decor--sm" style="top:10px;  left:8%;   animation-delay:-1s;" aria-hidden="true">⭐</span>
      <span class="decor decor--sm" style="top:18px;  right:7%;  animation-delay:-3s;" aria-hidden="true">🌈</span>
      <span class="decor decor--sm" style="bottom:14px; left:5%;  animation-delay:-2s;" aria-hidden="true">✨</span>
      <span class="decor decor--sm" style="bottom:20px; right:6%; animation-delay:-4s;" aria-hidden="true">🎈</span>
      <div class="display-inner">

        <!-- Stroke animation -->
        <button id="stroke-btn" aria-label="點擊重播筆順">
          <div id="stroke-zoom">
            <div id="ghost-strokes"></div>
            <svg id="stroke-svg" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <span id="stroke-counter"></span>
          <span class="stroke-replay-hint" aria-hidden="true">↺</span>
        </button>

        <!-- Example word with Zhuyin annotation -->
        <button id="word-btn" type="button" aria-label="播放範例詞發音">
          <div id="example-emoji-wrap">
            <span id="example-emoji"></span>
          </div>
          <div id="example-word"></div>
        </button>

      </div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-scroll" ontouchstart="">
      <div id="keyboard"></div>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
